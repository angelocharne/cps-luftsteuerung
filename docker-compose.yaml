services:
  fan-controller:
    build: ./app
    container_name: fan_controller
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    privileged: true
    devices:
      - /dev/i2c-1:/dev/i2c-1
    volumes:
      - ./data:/app/data

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    env_file:
      - path: .env
        required: false

volumes:
  influxdb_data:
  influxdb_config:
